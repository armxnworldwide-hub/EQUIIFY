<!DOCTYPE html>
<html>

<head>
    <title>Download Test</title>
</head>

<body>
    <h1>Testing Download Functionality</h1>
    <button onclick="testDownload()">Test Download</button>
    <button onclick="testOfflineStorage()">Test Offline Storage</button>
    <div id="status"></div>

    <script>
        let db;
        const dbName = "WideMusicDB";
        const storeName = "songs";

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);

                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(storeName)) {
                        db.createObjectStore(storeName, {
                            keyPath: 'title'
                        });
                    }
                };
            });
        }

        function testDownload() {
            document.getElementById('status').innerText = 'Testing download...';
            // Create a simple blob for testing
            const blob = new Blob(['test audio data'], {
                type: 'audio/mpeg'
            });
            storeSongOffline('Test Song', blob, 'test.jpg').then(() => {
                document.getElementById('status').innerText = 'Download test successful!';
            }).catch(error => {
                document.getElementById('status').innerText = 'Download test failed: ' + error;
            });
        }

        function storeSongOffline(title, blob, poster) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);

                const songData = {
                    title: title,
                    blob: blob,
                    poster: poster,
                    downloadedAt: new Date().toISOString()
                };

                const request = store.put(songData);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function testOfflineStorage() {
            document.getElementById('status').innerText = 'Testing offline storage...';
            getSongOffline('Test Song').then(url => {
                if (url) {
                    document.getElementById('status').innerText = 'Offline storage test successful! URL: ' + url.substring(0, 50) + '...';
                } else {
                    document.getElementById('status').innerText = 'Offline storage test: No data found';
                }
            }).catch(error => {
                document.getElementById('status').innerText = 'Offline storage test failed: ' + error;
            });
        }

        function getSongOffline(title) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.get(title);

                request.onsuccess = () => {
                    if (request.result) {
                        resolve(URL.createObjectURL(request.result.blob));
                    } else {
                        resolve(null);
                    }
                };
                request.onerror = () => reject(request.error);
            });
        }

        // Initialize
        initDB().then(() => {
            document.getElementById('status').innerText = 'Database initialized successfully';
        }).catch(error => {
            document.getElementById('status').innerText = 'Database initialization failed: ' + error;
        });
    </script>
</body>

</html>
